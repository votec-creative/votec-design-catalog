<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>デザイナー実績詳細 - VOTEC DESIGN CATALOG</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18212b;
        --muted: #667282;
        --line: #e2e6eb;
        --paper: #ffffff;
        --soft: #f8fafb;
        --brand: #169277;
        --brand-strong: #0f6f5c;
        --focus: 0 0 0 3px rgba(22, 146, 119, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--soft);
        letter-spacing: 0;
        overflow-x: hidden;
      }

      a,
      button {
        font: inherit;
      }

      button {
        border: 0;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid #e5e5e5;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        box-shadow: 0 1px 0 rgba(24, 33, 43, 0.04);
      }

      .header-inner {
        width: min(1360px, calc(100% - 40px));
        min-height: 72px;
        margin: 0 auto;
        padding: 12px 0;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
      }

      .brand-logo {
        display: block;
        width: 236px;
        max-width: 42vw;
        height: auto;
      }

      .site-nav {
        display: flex;
        gap: 2px;
        align-items: center;
      }

      .site-nav a {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0 16px;
        color: #2c3542;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
        transition: color 0.18s ease, box-shadow 0.18s ease;
      }

      .site-nav a:hover {
        background: #eef6f4;
        color: var(--brand-strong);
      }

      .site-nav .nav-cta {
        margin-left: 8px;
        border-radius: 999px;
        padding: 0 20px;
        background: var(--brand);
        color: #fff;
        box-shadow: 0 10px 22px rgba(22, 146, 119, 0.2);
      }

      .site-nav .nav-cta:hover {
        color: #fff;
        background: var(--brand-strong);
        box-shadow: 0 14px 28px rgba(15, 111, 92, 0.24);
      }

      .mobile-nav-cta {
        display: none;
      }

      .detail-main {
        width: min(100% - 44px, 1440px);
        margin: 0 auto;
        padding: 42px 0 76px;
      }

      .detail-hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        margin: 0 0 28px;
        padding: 28px 0 4px;
      }

      .eyebrow {
        width: fit-content;
        margin: 0 0 12px;
        border-radius: 999px;
        padding: 6px 11px;
        background: #e8f5f2;
        color: var(--brand-strong);
        font-size: 12px;
        font-weight: 900;
      }

      .detail-hero h1 {
        margin: 0;
        font-size: clamp(30px, 4.2vw, 52px);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .detail-hero p {
        max-width: 640px;
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.8;
      }

      .id-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin: 0 0 34px;
        padding: 16px 18px;
        border: 1px solid rgba(213, 221, 229, 0.9);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 40px rgba(24, 33, 43, 0.07);
      }

      .id-label {
        display: flex;
        gap: 12px;
        align-items: center;
        min-width: 0;
      }

      .id-label small {
        border-radius: 999px;
        padding: 5px 10px;
        background: #eceff2;
        color: #4d5967;
        font-size: 12px;
        font-weight: 900;
      }

      .id-label strong {
        font-size: clamp(24px, 3vw, 34px);
        line-height: 1;
      }

      .copy-button,
      .ghost-link {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 18px;
        font-weight: 900;
        text-decoration: none;
        white-space: nowrap;
        cursor: pointer;
      }

      .copy-button {
        background: var(--brand);
        color: #fff;
        box-shadow: 0 10px 22px rgba(22, 146, 119, 0.2);
        transition: background 0.18s ease, color 0.18s ease;
      }

      .copy-button:hover {
        background: var(--brand-strong);
      }

      .ghost-link {
        border: 1px solid #cfd7df;
        background: #fff;
        color: #23303d;
        transition: border 0.18s ease, color 0.18s ease, transform 0.18s ease;
      }

      .ghost-link:hover {
        border-color: var(--brand);
        color: var(--brand-strong);
        transform: translateY(-1px);
      }

      .detail-hero > .ghost-link {
        position: fixed;
        right: max(22px, calc((100vw - 1440px) / 2 + 22px));
        bottom: 24px;
        z-index: 30;
        box-shadow: 0 16px 36px rgba(24, 33, 43, 0.16);
      }

      .similar-section .section-head .ghost-link {
        display: none;
      }

      .work-detail-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        align-items: start;
      }

      .work-stage {
        position: relative;
        min-width: 0;
        display: grid;
        align-items: center;
        justify-items: center;
        padding: 26px;
        scroll-margin-top: 92px;
        border: 1px solid rgba(213, 221, 229, 0.9);
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(24, 33, 43, 0.08);
      }

      .main-banner {
        display: block;
        width: auto;
        max-width: 100%;
        max-height: min(82vh, 980px);
        height: auto;
        min-height: 0;
        object-fit: contain;
        scroll-margin-top: 96px;
        border-radius: 22px;
        box-shadow: 0 28px 70px rgba(22, 31, 42, 0.18);
        cursor: zoom-in;
      }

      .banner-preview {
        position: relative;
        display: inline-grid;
        place-items: start center;
        max-width: 100%;
        cursor: zoom-in;
      }

      .banner-preview.is-collapsed {
        height: min(calc(78vh - 118px), 560px);
        max-width: 100%;
        overflow: hidden;
        border-radius: 22px;
        box-shadow: 0 28px 70px rgba(22, 31, 42, 0.18);
      }

      .banner-preview.is-collapsed::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 34%;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.96));
      }

      .banner-preview.is-collapsed .main-banner {
        max-height: none;
        border-radius: 22px;
        box-shadow: none;
      }

      .banner-expand-hint {
        position: absolute;
        left: 50%;
        bottom: 18px;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 20px;
        border-radius: 999px;
        background: rgba(20, 158, 139, 0.96);
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0;
        box-shadow: 0 14px 30px rgba(20, 158, 139, 0.25);
        transform: translateX(-50%);
        white-space: nowrap;
        pointer-events: none;
      }

      .banner-expand-hint[hidden] {
        display: none;
      }

      .detail-nav-arrow {
        position: absolute;
        top: 50%;
        z-index: 40;
        width: 56px;
        height: 56px;
        display: inline-grid;
        place-items: center;
        border: 1px solid rgba(207, 215, 223, 0.9);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        color: #18212b;
        font-size: 24px;
        font-weight: 900;
        text-decoration: none;
        box-shadow: 0 14px 34px rgba(24, 33, 43, 0.18);
        transform: translateY(-50%);
        transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
      }

      .detail-nav-arrow:hover {
        background: var(--brand);
        color: #fff;
        transform: translateY(-50%) scale(1.04);
      }

      .detail-nav-prev {
        left: 18px;
      }

      .detail-nav-next {
        right: 18px;
      }

      .detail-nav-mobile {
        display: none;
      }

      @media (min-width: 761px) {
        .work-stage {
          height: min(86vh, 1030px);
          min-height: 560px;
        }

        .main-banner {
          width: auto;
          height: auto;
          max-height: min(calc(86vh - 52px), 978px);
        }

        .banner-preview.is-collapsed {
          height: min(calc(78vh - 118px), 560px);
        }
      }

      .image-lightbox {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: grid;
        place-items: start center;
        padding: 72px 28px 28px;
        background: rgba(7, 13, 18, 0.84);
        overflow: auto;
      }

      .image-lightbox[hidden] {
        display: none;
      }

      .image-lightbox img {
        display: block;
        width: auto;
        max-width: min(100%, 1680px);
        max-height: none;
        height: auto;
        border-radius: 12px;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.44);
        cursor: zoom-out;
      }

      .lightbox-close {
        position: fixed;
        top: max(18px, env(safe-area-inset-top));
        right: max(18px, env(safe-area-inset-right));
        z-index: 2;
        width: 52px;
        height: 52px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        color: #18212b;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      }

      body.is-lightbox-open {
        overflow: hidden;
      }

      .work-meta {
        position: sticky;
        top: 96px;
        width: 100%;
        margin: 0;
        padding: 22px;
        border: 1px solid rgba(213, 221, 229, 0.9);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 16px 40px rgba(24, 33, 43, 0.07);
        display: grid;
        gap: 20px;
      }

      .panel-label {
        margin: 0;
        color: var(--brand-strong);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .meta-block {
        display: grid;
        gap: 10px;
      }

      .meta-block-title {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .designer-action {
        display: grid;
        gap: 10px;
      }

      .nomination-tray {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 45;
        width: min(300px, calc(100vw - 28px));
        padding: 12px;
        border: 1px solid rgba(15, 39, 46, 0.14);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 18px 48px rgba(15, 39, 46, 0.16);
        backdrop-filter: blur(12px);
      }

      .nomination-tray[hidden] {
        display: none;
      }

      .nomination-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .nomination-head b {
        font-size: 13px;
      }

      .nomination-clear {
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 11px;
      }

      .nomination-list {
        display: grid;
        gap: 6px;
        margin: 0;
      }

      .nomination-row {
        display: grid;
        grid-template-columns: 64px 1fr auto;
        gap: 6px;
        align-items: center;
        min-height: 30px;
        padding: 6px 7px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #f8fafb;
        font-size: 12px;
      }

      .nomination-row dt {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .nomination-row dd {
        margin: 0;
        font-weight: 800;
      }

      .nomination-remove {
        width: 22px;
        height: 22px;
        border: 1px solid #d7e0e7;
        border-radius: 999px;
        background: #fff;
        cursor: pointer;
      }

      .nomination-note {
        margin: 8px 0 10px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.6;
      }

      .nomination-actions .ghost-link {
        width: 100%;
        min-height: 38px;
        padding: 0 12px;
        font-size: 12px;
        justify-content: center;
      }

      .similar-section {
        width: 100vw;
        margin: 72px 0 0 calc(50% - 50vw);
        padding: 0 14px;
      }

      .section-head {
        width: min(100%, 1680px);
        margin: 0 auto 24px;
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
      }

      .section-head h2 {
        margin: 0;
        font-size: clamp(26px, 3vw, 38px);
        line-height: 1.25;
      }

      .section-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .similar-grid {
        width: min(100%, 1680px);
        margin: 0 auto;
        display: block;
        column-count: 7;
        column-gap: 18px;
      }

      .similar-link {
        break-inside: avoid;
        display: block;
        margin: 0 0 18px;
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 1px 0 rgba(18, 35, 45, 0.08);
        text-decoration: none;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .similar-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 44px rgba(24, 33, 43, 0.16);
      }

      .similar-link img {
        display: block;
        width: 100%;
        height: auto;
      }

      .meta-top {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
      }

      .designer {
        display: grid;
        gap: 6px;
      }

      .designer-name {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
      }

      .designer-sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tags span,
      .tags a {
        border-radius: 999px;
        padding: 6px 10px;
        background: #eaeeee;
        color: #41505e;
        font-size: 12px;
        font-weight: 900;
        text-decoration: none;
        transition: background 0.18s ease, color 0.18s ease;
      }

      .tags a:hover {
        background: var(--green);
        color: #fff;
      }

      input:focus,
      button:focus-visible,
      a:focus-visible {
        outline: none;
        box-shadow: var(--focus);
      }

      @media (max-width: 760px) {
        .header-inner,
        .detail-hero,
        .id-row,
        .meta-top,
        .section-head {
          display: grid;
        }

        .site-nav {
          width: 100%;
          overflow-x: auto;
          padding-bottom: 2px;
        }

        .site-nav a {
          padding: 0 10px;
          font-size: 13px;
        }

        .site-nav .nav-cta {
          display: none;
        }

        .mobile-nav-cta {
          min-height: 46px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          border-radius: 999px;
          padding: 0 18px;
          background: var(--brand);
          color: #fff;
          font-size: 14px;
          font-weight: 900;
          text-decoration: none;
          box-shadow: 0 12px 26px rgba(22, 146, 119, 0.22);
        }

        .nomination-tray {
          right: 10px;
          left: 10px;
          bottom: 10px;
          width: auto;
          padding: 10px;
        }

        .nomination-note {
          margin-bottom: 8px;
        }

        .image-lightbox {
          padding: calc(68px + env(safe-area-inset-top)) 12px 18px;
        }

        .lightbox-close {
          top: max(10px, env(safe-area-inset-top));
          right: max(10px, env(safe-area-inset-right));
          width: 50px;
          height: 50px;
        }

        .detail-main {
          width: min(100% - 20px, 1180px);
          padding-top: 20px;
          padding-bottom: calc(112px + env(safe-area-inset-bottom));
        }

        .detail-hero {
          gap: 16px;
          padding-top: 10px;
        }

        .detail-hero h1 {
          font-size: clamp(30px, 10vw, 42px);
        }

        .copy-button,
        .ghost-link {
          width: 100%;
        }

        .detail-hero > .ghost-link {
          left: 10px;
          right: 10px;
          bottom: 12px;
          width: auto;
          min-height: 48px;
        }

        .main-banner {
          max-height: min(calc(78vh - 86px), 674px);
          border-radius: 14px;
        }

        .banner-preview.is-collapsed {
          height: min(calc(72vh - 120px), 420px);
          border-radius: 14px;
        }

        .banner-preview.is-collapsed .main-banner {
          border-radius: 14px;
        }

        .banner-expand-hint {
          bottom: 70px;
          min-height: 38px;
          padding: 0 16px;
          font-size: 13px;
        }

        .work-stage {
          height: min(78vh, 760px);
          min-height: 420px;
          padding: 12px;
          border-radius: 20px;
        }

        .detail-nav-arrow {
          display: none;
        }

        .detail-nav-mobile {
          position: fixed;
          left: 12px;
          right: 12px;
          bottom: calc(12px + env(safe-area-inset-bottom));
          z-index: 40;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
          margin: 0;
        }

        .detail-nav-mobile a {
          min-height: 46px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          border: 1px solid #cfd7df;
          border-radius: 999px;
          background: #fff;
          color: #23303d;
          font-weight: 900;
          text-decoration: none;
        }

        .work-detail-layout {
          grid-template-columns: 1fr;
          gap: 18px;
        }

        .work-meta {
          position: static;
          padding: 18px;
          border-radius: 18px;
        }

        .similar-grid {
          column-count: 2;
          column-gap: 10px;
        }

        .similar-section {
          margin-top: 42px;
          padding: 0 10px;
        }

        .section-head {
          width: 100%;
        }

        .similar-link {
          margin-bottom: 10px;
          border-radius: 10px;
        }
      }

      @media (min-width: 761px) and (max-width: 1180px) {
        .similar-grid {
          column-count: 4;
        }
      }

      @media (min-width: 1181px) and (max-width: 1500px) {
        .similar-grid {
          column-count: 6;
        }
      }

      @media (min-width: 1700px) {
        .similar-grid {
          column-count: 8;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" aria-label="VOTEC DESIGN CATALOG">
          <img class="brand-logo" src="assets/logo.png" alt="VOTEC">
        </a>
        <nav class="site-nav" aria-label="サイトメニュー">
          <a href="index.html">デザイナー実績</a>
          <a href="index.html#designers">在籍デザイナー</a>
          <a href="index.html#catalog">制作カタログ</a>
          <a href="index.html#templates">テンプレート</a>
          <a class="nav-cta" href="form.html">依頼フォームはこちら</a>
        </nav>
        <a class="mobile-nav-cta" href="form.html">依頼フォームはこちら</a>
      </div>
    </header>

    <main class="detail-main">
      <section class="detail-hero">
        <div>
          <p class="eyebrow">WORK DETAIL</p>
          <h1>デザイナー実績詳細</h1>
        </div>
        <a class="ghost-link" href="index.html">デザイナー実績一覧へ</a>
      </section>

      <div class="work-detail-layout">
        <section class="work-stage" id="workStage">
          <a class="detail-nav-arrow detail-nav-prev" id="prevWorkLink" href="#" aria-label="前の画像へ">←</a>
          <div class="banner-preview" id="bannerPreview">
            <img class="main-banner" id="mainBanner" src="" alt="" tabindex="0" role="button" aria-label="画像を拡大">
            <span class="banner-expand-hint" id="bannerExpandHint" hidden>クリックで全体表示</span>
          </div>
          <a class="detail-nav-arrow detail-nav-next" id="nextWorkLink" href="#" aria-label="次の画像へ">→</a>
          <div class="detail-nav-mobile">
            <a id="prevWorkMobileLink" href="#">前へ</a>
            <a id="nextWorkMobileLink" href="#">次へ</a>
          </div>
        </section>

        <aside class="work-meta" id="workMeta" aria-label="デザイナー情報"></aside>
      </div>

      <section class="similar-section" aria-label="似ているバナー">
          <div class="section-head">
            <div>
              <h2>似ているバナー</h2>
            </div>
          <a class="ghost-link" href="index.html">デザイナー実績一覧へ</a>
        </div>
        <div class="similar-grid" id="similarGrid"></div>
      </section>
    </main>
    <aside class="nomination-tray" id="nominationTray" hidden aria-label="指名候補">
      <div class="nomination-head">
        <b>指名候補</b>

            title: "デザイナー実績詳細",
            eyebrow: "DESIGNER WORK",
            back: "デザイナー実績一覧へ",
            backUrl: "index.html#works",
            listLabel: "デザイナー実績を見る",
            idLabel: "",
            metaLabel: "DESIGNER",
            tagTitle: "このデザイナー実績のタグ"
          },
          catalog: {
            title: "参考画像詳細",
            eyebrow: "CATALOG DETAIL",
            back: "制作カタログ（参考画像）一覧へ",
            backUrl: "index.html#catalog",
            listLabel: "制作カタログ（参考画像）を見る",
            idLabel: "参考画像ID",
            metaLabel: "CATALOG",
            tagTitle: "この参考画像のタグ"
          },
          template: {
            title: "テンプレート詳細",
            eyebrow: "TEMPLATE DETAIL",
            back: "テンプレート一覧へ",
            backUrl: "index.html#templates",
            listLabel: "テンプレートを見る",
            idLabel: "テンプレートID",
            metaLabel: "TEMPLATE",
            tagTitle: "テンプレート分類"
          }
        };
        const label = labels[current.type] || labels.work;
        document.title = `${label.title} - VOTEC DESIGN CATALOG`;
        document.querySelector(".eyebrow").textContent = label.eyebrow;
        document.querySelector(".detail-hero h1").textContent = label.title;
        const backLink = document.querySelector(".detail-hero .ghost-link");
        backLink.textContent = label.back;
        backLink.href = label.backUrl;
        const banner = document.querySelector("#mainBanner");
        banner.src = current.image;
        banner.alt = `${label.title}`;
        const designerWorksUrl = current.designer ? `index.html?designer=${encodeURIComponent(current.designer)}#works` : "index.html#works";
        const designerRequestUrl = current.designer ? `form.html?designer=${encodeURIComponent(current.designer)}` : "form.html";
        const idBlock = label.idLabel ? `
          <div class="meta-block">
            <p class="meta-block-title">${escapeHtml(label.idLabel)}</p>
            <div class="designer">
              <p class="designer-name">${escapeHtml(current.id)}</p>
            </div>
          </div>
        ` : "";
        const showDesignerInfo = current.type === "work" && current.designer;
        const designerBlock = showDesignerInfo ? `
          <div class="meta-block">
            <p class="meta-block-title">デザイナー情報</p>
            <div class="designer">
              <p class="designer-name">${escapeHtml(current.designer)}</p>
              <p class="designer-sub">${escapeHtml(current.region || "在籍デザイナー")}</p>
            </div>
          </div>
        ` : "";
        const actionBlock = current.type === "template" ? `
          <div class="designer-action">
            <button type="button" class="copy-button" data-copy-id="${escapeHtml(current.id)}">IDをコピー</button>
            <a class="ghost-link" href="index.html#templates">${escapeHtml(label.listLabel)}</a>
          </div>
        ` : current.type === "catalog" ? `
          <div class="designer-action">
            <button type="button" class="copy-button" data-copy-id="${escapeHtml(current.id)}">IDをコピー</button>
            <a class="ghost-link" href="index.html#catalog">${escapeHtml(label.listLabel)}</a>
          </div>
        ` : `
          <div class="designer-action">
            <a class="ghost-link" href="${designerRequestUrl}">この制作者を第一希望にする</a>
            <a class="ghost-link" href="${designerWorksUrl}">このデザイナーの実績を見る</a>
          </div>
        `;
        document.querySelector("#workMeta").innerHTML = `
          <p class="panel-label">${escapeHtml(label.metaLabel)}</p>
          ${idBlock}
          ${designerBlock}
          <div class="meta-block">
            <p class="meta-block-title">${escapeHtml(label.tagTitle)}</p>
            <div class="tags">${tagLinksHtml(current.tags)}</div>
          </div>
          ${actionBlock}
        `;
        const designerRequestLink = document.querySelector('.designer-action a[href^="form.html?designer="]');
        if (designerRequestLink && current.designer) {
          designerRequestLink.textContent = "指名候補に追加";
          designerRequestLink.href = "#";
          designerRequestLink.dataset.addNomination = current.designer;
        }
        document.querySelector(".similar-section .ghost-link").textContent = label.listLabel;
        document.querySelector(".similar-section .ghost-link").href = label.backUrl;
        document.querySelector("#similarGrid").innerHTML = currentCollection
          .filter((work) => work.id !== current.id)
          .map((work) => ({ work, score: similarity(current, work) }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 18)
          .map(({ work }) => `
            <a class="similar-link" href="${detailUrl(work)}" aria-label="${escapeHtml(label.title)}を見る">
              <img src="${escapeHtml(work.image)}" alt="${escapeHtml(label.title)}" loading="lazy">
            </a>
          `)
          .join("");
        setupAdjacentLink("#prevWorkLink", prevItem, "前の画像へ");
        setupAdjacentLink("#nextWorkLink", nextItem, "次の画像へ");
        setupAdjacentLink("#prevWorkMobileLink", prevItem, "前の画像へ");
        setupAdjacentLink("#nextWorkMobileLink", nextItem, "次の画像へ");
      }
      function similarity(base, candidate) {
        let score = 0;
        if (base.color === candidate.color) score += 5;
        if (base.tone === candidate.tone) score += 4;
        if (base.designer === candidate.designer) score += 2;
        candidate.tags.forEach((tag) => {
          if (base.tags.includes(tag)) score += 1;
        });
        return score;
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      render();
      renderNominationTray();

      const mainBanner = document.querySelector("#mainBanner");
      const bannerPreview = document.querySelector("#bannerPreview");
      const bannerExpandHint = document.querySelector("#bannerExpandHint");
      const workStage = document.querySelector("#workStage");
      const lightbox = document.querySelector("#imageLightbox");
      const lightboxImage = document.querySelector("#lightboxImage");
      const lightboxClose = document.querySelector("#lightboxClose");

      function alignStageTopFromHash() {
        if (!["#mainBanner", "#workStage"].includes(window.location.hash)) return;
        requestAnimationFrame(() => {
          workStage.scrollIntoView({ block: "start", inline: "nearest" });
        });
      }

      function updateBannerCollapse() {
        const ratio = mainBanner.naturalHeight / Math.max(mainBanner.naturalWidth, 1);
        const shouldCollapse = ratio >= 1.65;
        bannerPreview.classList.toggle("is-collapsed", shouldCollapse);
        bannerExpandHint.hidden = !shouldCollapse;
      }

      function handleBannerLoad() {
        updateBannerCollapse();
        alignStageTopFromHash();
      }

      if (mainBanner.complete) {
        handleBannerLoad();
      } else {
        mainBanner.addEventListener("load", handleBannerLoad, { once: true });
      }

      function openLightbox() {
        lightboxImage.src = mainBanner.src;
        lightboxImage.alt = mainBanner.alt;
        lightbox.hidden = false;
        document.body.classList.add("is-lightbox-open");
        lightboxClose.focus();
      }

      mainBanner.addEventListener("click", openLightbox);
      workStage.addEventListener("click", (event) => {
        if (event.target.closest(".detail-nav-arrow, .detail-nav-mobile")) return;
        if (event.target === mainBanner) return;
        openLightbox();
      });
      mainBanner.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openLightbox();
        }
      });

      function closeLightbox() {
        lightbox.hidden = true;
        lightboxImage.src = "";
        document.body.classList.remove("is-lightbox-open");
        mainBanner.focus();
      }

      lightboxClose.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) closeLightbox();
        if (event.target === lightboxImage) closeLightbox();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !lightbox.hidden) closeLightbox();
        if (!lightbox.hidden) return;
        if (event.key === "ArrowLeft" && prevItem) window.location.href = detailUrl(prevItem, true);
        if (event.key === "ArrowRight" && nextItem) window.location.href = detailUrl(nextItem, true);
      });
      document.addEventListener("click", (event) => {
        const addNominationButton = event.target.closest("[data-add-nomination]");
        if (addNominationButton) {
          event.preventDefault();
          addNomination(addNominationButton.dataset.addNomination || "");
          return;
        }
        const removeNominationButton = event.target.closest("[data-remove-nomination]");
        if (removeNominationButton) {
          removeNomination(Number(removeNominationButton.dataset.removeNomination));
          return;
        }
        const clearNominationButton = event.target.closest("#nominationClear");
        if (clearNominationButton) {
          clearNominations();
          return;
        }
        const copyButton = event.target.closest("[data-copy-id]");
        if (!copyButton) return;
        const text = copyButton.dataset.copyId || "";
        navigator.clipboard?.writeText(text).then(() => {
          copyButton.textContent = "コピーしました";
          setTimeout(() => {
            copyButton.textContent = "IDをコピー";
          }, 1200);
        });
      });
    </script>
  </body>
</html>
