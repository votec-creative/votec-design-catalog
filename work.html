<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>デザイナー実績詳細 - VOTEC DESIGN CATALOG</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18212b;
        --muted: #667282;
        --line: #e2e6eb;
        --paper: #ffffff;
        --soft: #f8fafb;
        --brand: #169277;
        --brand-strong: #0f6f5c;
        --focus: 0 0 0 3px rgba(22, 146, 119, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--soft);
        letter-spacing: 0;
      }

      a,
      button {
        font: inherit;
      }

      button {
        border: 0;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid #e5e5e5;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        box-shadow: 0 1px 0 rgba(24, 33, 43, 0.04);
      }

      .header-inner {
        width: min(1360px, calc(100% - 40px));
        min-height: 72px;
        margin: 0 auto;
        padding: 12px 0;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
      }

      .brand-logo {
        display: block;
        width: 236px;
        max-width: 42vw;
        height: auto;
      }

      .site-nav {
        display: flex;
        gap: 2px;
        align-items: center;
      }

      .site-nav a {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0 16px;
        color: #2c3542;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
        transition: color 0.18s ease, box-shadow 0.18s ease;
      }

      .site-nav a:hover {
        background: #eef6f4;
        color: var(--brand-strong);
      }

      .site-nav .nav-cta {
        margin-left: 8px;
        border-radius: 999px;
        padding: 0 20px;
        background: var(--brand);
        color: #fff;
        box-shadow: 0 10px 22px rgba(22, 146, 119, 0.2);
      }

      .site-nav .nav-cta:hover {
        color: #fff;
        background: var(--brand-strong);
        box-shadow: 0 14px 28px rgba(15, 111, 92, 0.24);
      }

      .detail-main {
        width: min(100% - 44px, 1440px);
        margin: 0 auto;
        padding: 42px 0 76px;
      }

      .detail-hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        margin: 0 0 28px;
        padding: 28px 0 4px;
      }

      .eyebrow {
        width: fit-content;
        margin: 0 0 12px;
        border-radius: 999px;
        padding: 6px 11px;
        background: #e8f5f2;
        color: var(--brand-strong);
        font-size: 12px;
        font-weight: 900;
      }

      .detail-hero h1 {
        margin: 0;
        font-size: clamp(30px, 4.2vw, 52px);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .detail-hero p {
        max-width: 640px;
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.8;
      }

      .id-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin: 0 0 34px;
        padding: 16px 18px;
        border: 1px solid rgba(213, 221, 229, 0.9);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 40px rgba(24, 33, 43, 0.07);
      }

      .id-label {
        display: flex;
        gap: 12px;
        align-items: center;
        min-width: 0;
      }

      .id-label small {
        border-radius: 999px;
        padding: 5px 10px;
        background: #eceff2;
        color: #4d5967;
        font-size: 12px;
        font-weight: 900;
      }

      .id-label strong {
        font-size: clamp(24px, 3vw, 34px);
        line-height: 1;
      }

      .copy-button,
      .ghost-link {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 18px;
        font-weight: 900;
        text-decoration: none;
        white-space: nowrap;
        cursor: pointer;
      }

      .copy-button {
        background: var(--brand);
        color: #fff;
        box-shadow: 0 10px 22px rgba(22, 146, 119, 0.2);
        transition: background 0.18s ease, color 0.18s ease;
      }

      .copy-button:hover {
        background: var(--brand-strong);
      }

      .ghost-link {
        border: 1px solid #cfd7df;
        background: #fff;
        color: #23303d;
        transition: border 0.18s ease, color 0.18s ease, transform 0.18s ease;
      }

      .ghost-link:hover {
        border-color: var(--brand);
        color: var(--brand-strong);
        transform: translateY(-1px);
      }

      .work-detail-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        align-items: start;
      }

      .work-stage {
        position: relative;
        min-width: 0;
        display: grid;
        justify-items: center;
        padding: 26px;
        border: 1px solid rgba(213, 221, 229, 0.9);
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(24, 33, 43, 0.08);
      }

      .main-banner {
        display: block;
        width: auto;
        max-width: 100%;
        max-height: min(82vh, 980px);
        height: auto;
        border-radius: 22px;
        box-shadow: 0 28px 70px rgba(22, 31, 42, 0.18);
        cursor: zoom-in;
      }

      .detail-nav-arrow {
        position: absolute;
        top: 50%;
        z-index: 3;
        width: 56px;
        height: 56px;
        display: inline-grid;
        place-items: center;
        border: 1px solid rgba(207, 215, 223, 0.9);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        color: #18212b;
        font-size: 24px;
        font-weight: 900;
        text-decoration: none;
        box-shadow: 0 14px 34px rgba(24, 33, 43, 0.18);
        transform: translateY(-50%);
        transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
      }

      .detail-nav-arrow:hover {
        background: var(--brand);
        color: #fff;
        transform: translateY(-50%) scale(1.04);
      }

      .detail-nav-prev {
        left: 18px;
      }

      .detail-nav-next {
        right: 18px;
      }

      .detail-nav-mobile {
        display: none;
      }

      .image-lightbox {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: grid;
        place-items: start center;
        padding: 28px;
        background: rgba(7, 13, 18, 0.84);
        overflow: auto;
      }

      .image-lightbox[hidden] {
        display: none;
      }

      .image-lightbox img {
        display: block;
        width: auto;
        max-width: min(100%, 1680px);
        max-height: none;
        height: auto;
        border-radius: 12px;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.44);
        cursor: zoom-out;
      }

      .lightbox-close {
        position: fixed;
        top: 18px;
        right: 18px;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        color: #18212b;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
      }

      .work-meta {
        position: sticky;
        top: 96px;
        width: 100%;
        margin: 0;
        padding: 22px;
        border: 1px solid rgba(213, 221, 229, 0.9);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 16px 40px rgba(24, 33, 43, 0.07);
        display: grid;
        gap: 20px;
      }

      .panel-label {
        margin: 0;
        color: var(--brand-strong);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .meta-block {
        display: grid;
        gap: 10px;
      }

      .meta-block-title {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .designer-action {
        display: grid;
        gap: 10px;
      }

      .similar-section {
        width: 100vw;
        margin: 72px 0 0 calc(50% - 50vw);
        padding: 0 14px;
      }

      .section-head {
        width: min(100%, 1680px);
        margin: 0 auto 24px;
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
      }

      .section-head h2 {
        margin: 0;
        font-size: clamp(26px, 3vw, 38px);
        line-height: 1.25;
      }

      .section-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .similar-grid {
        width: min(100%, 1680px);
        margin: 0 auto;
        display: block;
        column-count: 7;
        column-gap: 18px;
      }

      .similar-link {
        break-inside: avoid;
        display: block;
        margin: 0 0 18px;
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 1px 0 rgba(18, 35, 45, 0.08);
        text-decoration: none;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .similar-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 44px rgba(24, 33, 43, 0.16);
      }

      .similar-link img {
        display: block;
        width: 100%;
        height: auto;
      }

      .meta-top {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
      }

      .designer {
        display: grid;
        gap: 6px;
      }

      .designer-name {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
      }

      .designer-sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tags span {
        border-radius: 999px;
        padding: 6px 10px;
        background: #eaeeee;
        color: #41505e;
        font-size: 12px;
        font-weight: 900;
      }

      input:focus,
      button:focus-visible,
      a:focus-visible {
        outline: none;
        box-shadow: var(--focus);
      }

      @media (max-width: 760px) {
        .header-inner,
        .detail-hero,
        .id-row,
        .meta-top,
        .section-head {
          display: grid;
        }

        .site-nav {
          width: 100%;
          overflow-x: auto;
          padding-bottom: 2px;
        }

        .site-nav a {
          padding: 0 10px;
          font-size: 13px;
        }

        .detail-main {
          width: min(100% - 20px, 1180px);
          padding-top: 20px;
        }

        .detail-hero {
          gap: 16px;
          padding-top: 10px;
        }

        .detail-hero h1 {
          font-size: clamp(30px, 10vw, 42px);
        }

        .copy-button,
        .ghost-link {
          width: 100%;
        }

        .main-banner {
          border-radius: 14px;
        }

        .work-stage {
          padding: 12px;
          border-radius: 20px;
        }

        .detail-nav-arrow {
          display: none;
        }

        .detail-nav-mobile {
          width: 100%;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
          margin-top: 12px;
        }

        .detail-nav-mobile a {
          min-height: 46px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          border: 1px solid #cfd7df;
          border-radius: 999px;
          background: #fff;
          color: #23303d;
          font-weight: 900;
          text-decoration: none;
        }

        .work-detail-layout {
          grid-template-columns: 1fr;
          gap: 18px;
        }

        .work-meta {
          position: static;
          padding: 18px;
          border-radius: 18px;
        }

        .similar-grid {
          column-count: 2;
          column-gap: 10px;
        }

        .similar-section {
          margin-top: 42px;
          padding: 0 10px;
        }

        .section-head {
          width: 100%;
        }

        .similar-link {
          margin-bottom: 10px;
          border-radius: 10px;
        }
      }

      @media (min-width: 761px) and (max-width: 1180px) {
        .similar-grid {
          column-count: 4;
        }
      }

      @media (min-width: 1181px) and (max-width: 1500px) {
        .similar-grid {
          column-count: 6;
        }
      }

      @media (min-width: 1700px) {
        .similar-grid {
          column-count: 8;
        }
      }
    </style>
  </head>

              {

              },
              {
                      "name": "藤原 葵",
                      "region": "関西",

              },
              {

              },
              {
                      "name": "長谷川 結",
                      "region": "関西",
                      "role": "デザイナー"
              },
              {
                      "name": "近藤 翼",
                      "region": "関西",
                      "role": "デザイナー"
              },
              {
                      "name": "前田 茜",
                      "region": "関西",
                      "role": "デザイナー"
              },
              {
                      "name": "遠藤 顕",
                      "region": "九州",
                      "role": "デザイナー"
              },
              {
                      "name": "青木 美月",
                      "region": "九州",
                      "role": "リーダー"
              },
              {
                      "name": "坂本 直",
                      "region": "九州",
                      "role": "デザイナー"
              },
              {
                      "name": "村上 玲",
                      "region": "九州",

              },
              {
                      "name": "太田 樹央",
                      "region": "九州",
                      "role": "デザイナー"
              },
              {
                      "name": "西村 圭",
                      "region": "九州",
                      "role": "デザイナー"
              },
              {
                      "name": "福田 真央",
                      "region": "九州",
                      "role": "デザイナー"
              },
              {
                      "name": "三浦 仁",
                      "region": "九州",
                      "role": "デザイナー"
              }
      ];

      const palettes = ["pink","blue","green","warm","red","yellow","black","white","gold","silver"];
      const tones = ["strong","luxury","fresh","pop","cute","simple","neon","classic"];
      const tagSets = [
              [
                      "バナー",
                      "訴求強め",
                      "高単価"
              ],
              [
                      "求人",
                      "女性向け",
                      "清潔感"
              ],
              [
                      "イベント",
                      "季節感",
                      "キャンペーン"
              ],
              [
                      "高級感",
                      "ゴールド",
                      "インパクト"
              ],
              [
                      "ポップ",
                      "かわいい",
                      "ピンク"
              ],
              [
                      "クール",
                      "ネオン",
                      "派手"
              ],
              [
                      "シンプル",
                      "白系",
                      "読みやすい"
              ],
              [
                      "和風",
                      "正月",
                      "華やか"
              ],
              [
                      "男性求人",
                      "ホスト",
                      "黒系"
              ],
              [
                      "縦長",
                      "LP",
                      "情報量多め"
              ]
      ];

      const works = portfolioImages.map((image, index) => {
        const designer = designers[index % designers.length];
        return {
          id: String(143667 + index),
          type: "work",
          designer: designer.name,
          region: designer.region,
          role: designer.role,
          image,
          color: palettes[index % palettes.length],
          tone: tones[index % tones.length],
          tags: tagSets[index % tagSets.length]
        };
      });

      const catalogItems = works.map((work, index) => ({
        ...work,
        id: `CT-${String(index + 1).padStart(4, "0")}`,
        sourceId: work.id,
        type: "catalog"
      }));

      const templates = portfolioImages.slice(0, Math.min(portfolioImages.length, 72)).map((image, index) => ({
        id: `TP-${String(index + 1).padStart(4, "0")}`,
        type: "template",
        title: `テンプレート ${String(index + 1).padStart(3, "0")}`,
        image,
        color: palettes[index % palettes.length],
        tone: tones[index % tones.length],
        tags: tagSets[index % tagSets.length]
      }));

      const params = new URLSearchParams(window.location.search);
      const requestedType = params.get("type") || "work";
      const collections = {
        work: works,
        catalog: catalogItems,
        template: templates
      };
      const currentCollection = collections[requestedType] || works;
      const current = currentCollection.find((work) => work.id === params.get("id")) || currentCollection[0];
      const currentIndex = currentCollection.findIndex((work) => work.id === current.id);
      const prevItem = currentIndex > 0 ? currentCollection[currentIndex - 1] : null;
      const nextItem = currentIndex >= 0 && currentIndex < currentCollection.length - 1 ? currentCollection[currentIndex + 1] : null;

      function detailUrl(item) {
        return `work.html?type=${encodeURIComponent(item.type)}&id=${encodeURIComponent(item.id)}`;
      }

      function setupAdjacentLink(selector, item, fallbackLabel) {
        const link = document.querySelector(selector);
        if (!link) return;
        if (!item) {
          link.hidden = true;
          return;
        }
        link.hidden = false;
        link.href = detailUrl(item);
        link.setAttribute("aria-label", `${fallbackLabel}: ${item.id}`);
      }

      function render() {
        const labels = {
          work: {
            title: "デザイナー実績詳細",
            eyebrow: "DESIGNER WORK",
            back: "デザイナー実績一覧へ",
            backUrl: "index.html#works",
            listLabel: "デザイナー実績を見る",
            idLabel: "",
            metaLabel: "DESIGNER",
            tagTitle: "このデザイナー実績のタグ"
          },
          catalog: {
            title: "制作カタログ詳細",
            eyebrow: "CATALOG DETAIL",
            back: "制作カタログ一覧へ",
            backUrl: "index.html#catalog",
            listLabel: "制作カタログを見る",
            idLabel: "制作カタログID",
            metaLabel: "CATALOG",
            tagTitle: "この制作カタログのタグ"
          },
          template: {
            title: "テンプレート詳細",
            eyebrow: "TEMPLATE DETAIL",
            back: "テンプレート一覧へ",
            backUrl: "index.html#templates",
            listLabel: "テンプレートを見る",
            idLabel: "テンプレートID",
            metaLabel: "TEMPLATE",
            tagTitle: "このテンプレートのタグ"
          }
        };
        const label = labels[current.type] || labels.work;
        document.title = `${label.title} - VOTEC DESIGN CATALOG`;
        document.querySelector(".eyebrow").textContent = label.eyebrow;
        document.querySelector(".detail-hero h1").textContent = label.title;
        const backLink = document.querySelector(".detail-hero .ghost-link");
        backLink.textContent = label.back;
        backLink.href = label.backUrl;
        const banner = document.querySelector("#mainBanner");
        banner.src = current.image;
        banner.alt = `${label.title}`;
        const designerWorksUrl = current.designer ? `index.html?designer=${encodeURIComponent(current.designer)}#works` : "index.html#works";
        const designerRequestUrl = current.designer ? `form.html?designer=${encodeURIComponent(current.designer)}` : "form.html";
        const idBlock = label.idLabel ? `
          <div class="meta-block">
            <p class="meta-block-title">${escapeHtml(label.idLabel)}</p>
            <div class="designer">
              <p class="designer-name">${escapeHtml(current.id)}</p>
            </div>
          </div>
        ` : "";
        const showDesignerInfo = current.type === "work" && current.designer;
        const designerBlock = showDesignerInfo ? `
          <div class="meta-block">
            <p class="meta-block-title">デザイナー情報</p>
            <div class="designer">
              <p class="designer-name">${escapeHtml(current.designer)}</p>
              <p class="designer-sub">${escapeHtml(current.region)} / ${escapeHtml(current.role)}</p>
            </div>
          </div>
        ` : "";
        const actionBlock = current.type === "template" ? `
          <div class="designer-action">
            <button type="button" class="copy-button" data-copy-id="${escapeHtml(current.id)}">IDをコピー</button>
            <a class="ghost-link" href="index.html#templates">${escapeHtml(label.listLabel)}</a>
          </div>
        ` : current.type === "catalog" ? `
          <div class="designer-action">
            <button type="button" class="copy-button" data-copy-id="${escapeHtml(current.id)}">IDをコピー</button>
            <a class="ghost-link" href="index.html#catalog">${escapeHtml(label.listLabel)}</a>
          </div>
        ` : `
          <div class="designer-action">
            <a class="ghost-link" href="${designerRequestUrl}">この制作者を第一希望にする</a>
            <a class="ghost-link" href="${designerWorksUrl}">このデザイナーの実績を見る</a>
          </div>
        `;
        document.querySelector("#workMeta").innerHTML = `
          <p class="panel-label">${escapeHtml(label.metaLabel)}</p>
          ${idBlock}
          ${designerBlock}
          <div class="meta-block">
            <p class="meta-block-title">${escapeHtml(label.tagTitle)}</p>
            <div class="tags">${current.tags.map((tag) => `<span>${escapeHtml(tag)}</span>`).join("")}</div>
          </div>
          ${actionBlock}
        `;
        document.querySelector(".similar-section .ghost-link").textContent = label.listLabel;
        document.querySelector(".similar-section .ghost-link").href = label.backUrl;
        document.querySelector("#similarGrid").innerHTML = currentCollection
          .filter((work) => work.id !== current.id)
          .map((work) => ({ work, score: similarity(current, work) }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 18)
          .map(({ work }) => `
            <a class="similar-link" href="work.html?type=${encodeURIComponent(work.type)}&id=${encodeURIComponent(work.id)}" aria-label="${escapeHtml(label.title)}を見る">
              <img src="${escapeHtml(work.image)}" alt="${escapeHtml(label.title)}" loading="lazy">
            </a>
          `)
          .join("");
        setupAdjacentLink("#prevWorkLink", prevItem, "前の画像へ");
        setupAdjacentLink("#nextWorkLink", nextItem, "次の画像へ");
        setupAdjacentLink("#prevWorkMobileLink", prevItem, "前の画像へ");
        setupAdjacentLink("#nextWorkMobileLink", nextItem, "次の画像へ");
      }
      function similarity(base, candidate) {
        let score = 0;
        if (base.color === candidate.color) score += 5;
        if (base.tone === candidate.tone) score += 4;
        if (base.designer === candidate.designer) score += 2;
        candidate.tags.forEach((tag) => {
          if (base.tags.includes(tag)) score += 1;
        });
        return score;
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      render();

      const mainBanner = document.querySelector("#mainBanner");
      const workStage = document.querySelector("#workStage");
      const lightbox = document.querySelector("#imageLightbox");
      const lightboxImage = document.querySelector("#lightboxImage");
      const lightboxClose = document.querySelector("#lightboxClose");

      function openLightbox() {
        lightboxImage.src = mainBanner.src;
        lightboxImage.alt = mainBanner.alt;
        lightbox.hidden = false;
      }

      mainBanner.addEventListener("click", openLightbox);
      workStage.addEventListener("click", (event) => {
        if (event.target.closest(".detail-nav-arrow, .detail-nav-mobile")) return;
        if (event.target === mainBanner) return;
        openLightbox();
      });
      mainBanner.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openLightbox();
        }
      });

      function closeLightbox() {
        lightbox.hidden = true;
        lightboxImage.src = "";
      }

      lightboxClose.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) closeLightbox();
        if (event.target === lightboxImage) closeLightbox();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !lightbox.hidden) closeLightbox();
        if (!lightbox.hidden) return;
        if (event.key === "ArrowLeft" && prevItem) window.location.href = detailUrl(prevItem);
        if (event.key === "ArrowRight" && nextItem) window.location.href = detailUrl(nextItem);
      });
      document.addEventListener("click", (event) => {
        const copyButton = event.target.closest("[data-copy-id]");
        if (!copyButton) return;
        const text = copyButton.dataset.copyId || "";
        navigator.clipboard?.writeText(text).then(() => {
          copyButton.textContent = "コピーしました";
          setTimeout(() => {
            copyButton.textContent = "IDをコピー";
          }, 1200);
        });
      });
    </script>
